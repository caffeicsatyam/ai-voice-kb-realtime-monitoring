<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickFund — Indonesia Finance Voice Bot</title>
    <meta name="description" content="Consumer finance installment reminder agent for Indonesia in Bahasa Indonesia">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container single-col">
        <div class="header glass-panel">
            <h1>🇮🇩 Indonesia Finance</h1>
            <nav class="nav-links">
                <a href="/">Loan Agent</a>
                <a href="/philippines">Philippines</a>
                <a href="/indonesia" class="active">Indonesia</a>
                <a href="/dashboard">Nudges</a>
            </nav>
            <span class="badge id"><span class="status-dot red"></span> Bahasa</span>
        </div>

        <div class="chat-panel glass-panel" style="max-height: calc(100vh - 120px);">
            <div id="chat-messages" class="chat-messages"></div>
            <div class="chat-input">
                <button id="mic-btn" class="btn btn-mic" title="Voice input (Bahasa Indonesia)">🎤</button>
                <input type="text" id="chat-input" placeholder="Tanyakan tentang cicilan, tenor, pembayaran, atau jatuh tempo..." autocomplete="off">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
        </div>
    </div>

    <script src="/static/js/voice.js"></script>
    <script>
        const agent = new VoiceAgent('indonesia');
    </script>
</body>
</html>
